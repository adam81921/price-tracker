name: track prices

on:
  schedule:
    - cron: '10 13 * * *'   # 21:10 台北時間
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: track
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tracker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
        run: python3 tracker.py

      - name: Commit data
        run: |
          git config user.name "price-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(TZ=Asia/Taipei date +%F)"
          git push
